name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Compile all modules
        run: python -m py_compile scripts/run_subagent.py scripts/_loader.py scripts/_resolver.py scripts/_builder.py scripts/_executor.py scripts/_stream.py scripts/_doctor.py summon.py install.py

      - name: Unit tests (dispatcher)
        run: python scripts/test_discovery.py

      - name: Unit tests (installer safety, isolated fake homes)
        run: python tests/test_install.py

      - name: Doctor runs clean on a bare machine (exit 1 = no backends, still valid JSON)
        shell: bash
        run: |
          python summon.py --doctor || true
          python summon.py --doctor --json > doctor.json || true
          python -c "import json; d=json.load(open('doctor.json')); assert isinstance(d['ok'], bool); print('doctor JSON ok, usable:', d['usable_backends'])"

      - name: List bundled agents
        shell: bash
        run: |
          python summon.py --list --agents-dir agents > agents.json
          python -c "import json; d=json.load(open('agents.json')); assert len(d['agents']) >= 20, d; print(len(d['agents']), 'agents')"

      - name: Model discovery (static sources only on CI)
        shell: bash
        run: |
          python summon.py --list-models > models.json
          python -c "import json; m=json.load(open('models.json'))['models']; assert set(m) == {'claude','codex','agy','cursor-agent','gemini'}; print({k: v['source'] for k, v in m.items()})"

      - name: Dry-run resolves without executing (no backend needed)
        shell: bash
        run: |
          python summon.py --agent reviewer --prompt "x" --cwd "$PWD" --agents-dir agents --dry-run > dry.json
          python -c "import json; d=json.load(open('dry.json')); assert d['dry_run'] and d['cli']=='codex' and d['permission_flags'], d"

      - name: Manifest + schema examples parse and validate
        shell: bash
        run: |
          python - <<'PY'
          import json, sys
          sys.path.insert(0, "scripts")
          import _schema
          json.load(open("examples/jobs.json"))
          schema = json.load(open("examples/verdict.schema.json"))
          good = {"verdict": "block", "confidence": 0.9,
                  "findings": [{"severity": "critical", "summary": "x"}]}
          assert _schema.validate(good, schema) == []
          bad = {"verdict": "maybe", "confidence": 2, "findings": []}
          assert _schema.validate(bad, schema)  # enum + maximum violations
          print("examples valid; schema validator agrees")
          PY

      - name: Installer dry-run
        shell: bash
        run: |
          mkdir -p "$HOME/.claude"
          python install.py --dry-run

      - name: Installer safety - unowned dir refused with EXACT exit 2
        shell: bash
        run: |
          # Refusal must be the specific exit code 2 (not just "nonzero").
          mkdir -p "$HOME/.claude/skills/summon"
          touch "$HOME/.claude/skills/summon/USER_FILE"
          set +e
          python install.py --hosts claude --uninstall; rc1=$?
          python install.py --hosts claude --no-agents; rc2=$?
          set -e
          [ "$rc1" -eq 2 ] || { echo "uninstall refusal: expected 2, got $rc1"; exit 1; }
          [ "$rc2" -eq 2 ] || { echo "reinstall refusal: expected 2, got $rc2"; exit 1; }
          test -f "$HOME/.claude/skills/summon/USER_FILE"
          rm -rf "$HOME/.claude/skills/summon"
          echo "ownership guard holds (exit 2 exactly)"

      - name: Installed copy end-to-end (real host dir on the runner)
        shell: bash
        run: |
          python install.py --hosts claude
          test -f "$HOME/.claude/skills/summon/SKILL.md"
          test -f "$HOME/.claude/skills/summon/.summon-install.json"
          python "$HOME/.claude/skills/summon/scripts/run_subagent.py" --list --agents-dir agents > /dev/null
          python install.py --hosts claude --uninstall
          test ! -d "$HOME/.claude/skills/summon"
          echo "installed copy dispatch path + clean uninstall verified"
