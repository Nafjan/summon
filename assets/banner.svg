<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="summon — any AI CLI can summon the others as sub-agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#141A38"/>
      <stop offset="1" stop-color="#0A0E1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.26" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <style>
      .sans { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="20" fill="url(#glow)"/>
  <rect width="1200" height="360" rx="20" fill="url(#glow2)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="18.5" fill="none" stroke="#2A335B" stroke-width="1.5"/>

  <!-- wordmark -->
  <text x="72" y="128" class="mono" font-size="86" font-weight="700" fill="url(#wordmark)">/summon</text>
  <text x="76" y="182" class="sans" font-size="27" font-weight="600" fill="#E7ECFF">Summon any AI, from any CLI.</text>
  <text x="76" y="216" class="sans" font-size="19" fill="#93A0C4">One skill turns your agent into a conductor for all</text>
  <text x="76" y="242" class="sans" font-size="19" fill="#93A0C4">the others. Dispatch, swarm, or convene a council.</text>

  <!-- install command chip -->
  <rect x="76" y="278" width="452" height="46" rx="10" fill="#0E1430" stroke="#3B2E6E" stroke-width="1.5"/>
  <text x="96" y="307" class="mono" font-size="20" fill="#67E8F9">npx skills add<tspan fill="#E7ECFF"> Nafjan/summon</tspan></text>

  <!-- hub -->
  <g>
    <line x1="820" y1="180" x2="946" y2="70"  stroke="#3A3566" stroke-width="1.5"/>
    <line x1="820" y1="180" x2="962" y2="124" stroke="#3A3566" stroke-width="1.5"/>
    <line x1="820" y1="180" x2="968" y2="180" stroke="#3A3566" stroke-width="1.5"/>
    <line x1="820" y1="180" x2="962" y2="236" stroke="#3A3566" stroke-width="1.5"/>
    <line x1="820" y1="180" x2="946" y2="290" stroke="#3A3566" stroke-width="1.5"/>

    <circle cx="820" cy="180" r="52" fill="#160E33" stroke="#8B5CF6" stroke-width="2"/>
    <text x="820" y="176" text-anchor="middle" class="sans" font-size="17" font-weight="700" fill="#C4B5FD">any</text>
    <text x="820" y="196" text-anchor="middle" class="sans" font-size="17" font-weight="700" fill="#C4B5FD">host</text>

    <!-- backend chips -->
    <g class="sans" font-size="15" font-weight="600">
      <g><rect x="948" y="52" width="118" height="34" rx="17" fill="#171E3E" stroke="#3B4570" stroke-width="1.3"/><text x="1007" y="74" text-anchor="middle" fill="#CDD6F4">claude</text></g>
      <g><rect x="966" y="107" width="118" height="34" rx="17" fill="#171E3E" stroke="#3B4570" stroke-width="1.3"/><text x="1025" y="129" text-anchor="middle" fill="#CDD6F4">codex</text></g>
      <g><rect x="972" y="163" width="118" height="34" rx="17" fill="#171E3E" stroke="#3B4570" stroke-width="1.3"/><text x="1031" y="185" text-anchor="middle" fill="#CDD6F4">cursor</text></g>
      <g><rect x="966" y="219" width="118" height="34" rx="17" fill="#171E3E" stroke="#3B4570" stroke-width="1.3"/><text x="1025" y="241" text-anchor="middle" fill="#CDD6F4">gemini</text></g>
      <g><rect x="948" y="274" width="134" height="34" rx="17" fill="#171E3E" stroke="#3B4570" stroke-width="1.3"/><text x="1015" y="296" text-anchor="middle" fill="#CDD6F4">antigravity</text></g>
    </g>
  </g>
</svg>
